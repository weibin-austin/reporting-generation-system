name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:4.0
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK: http://localhost:4566

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Create AWS resources in LocalStack
        run: |
          aws --endpoint-url $LOCALSTACK sns create-topic --name reporting_topic
          for q in Excel_Request_Queue PDF_Request_Queue Excel_Response_Queue PDF_Response_Queue email_queue Email_Queue; do
            aws --endpoint-url $LOCALSTACK sqs create-queue --queue-name $q
          done
          aws --endpoint-url $LOCALSTACK s3 mb s3://reporting-generated-file
          aws --endpoint-url $LOCALSTACK sns subscribe \
            --topic-arn arn:aws:sns:us-east-1:000000000000:reporting_topic \
            --protocol sqs \
            --notification-endpoint arn:aws:sqs:us-east-1:000000000000:Excel_Request_Queue
          aws --endpoint-url $LOCALSTACK sns subscribe \
            --topic-arn arn:aws:sns:us-east-1:000000000000:reporting_topic \
            --protocol sqs \
            --notification-endpoint arn:aws:sqs:us-east-1:000000000000:PDF_Request_Queue

      - name: Build and test
        run: mvn -B clean verify
        env:
          SPRING_PROFILES_ACTIVE: local
