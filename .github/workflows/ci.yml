name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:4.0
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK: http://localhost:4566

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Create AWS resources in LocalStack
        run: AWS_ENDPOINT=$LOCALSTACK ./scripts/setup_localstack.sh

      - name: Build and test
        run: mvn -B clean verify
        env:
          SPRING_PROFILES_ACTIVE: local
