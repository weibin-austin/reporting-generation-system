logging.level.com.antra=DEBUG
logging.file.name=main.service.log
server.port=8080

# Report metadata store (PostgreSQL). Override per environment via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/report}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
# Disable open-session-in-view (Spring recommends against it): keeps the sync
# response from returning a stale first-level-cached entity while the worker
# threads commit their status updates in separate sessions.
spring.jpa.open-in-view=false

#Replace with your own !!!!!
cloud.aws.region.static=us-east-1
cloud.aws.credentials.accessKey=
cloud.aws.credentials.secretKey=
cloud.aws.stack.auto = false

app.aws.sns.topic=reporting_topic

# JWT / auth. Override the secret and demo credentials per environment.
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes!!}
app.jwt.expiration-ms=3600000
app.auth.username=admin
app.auth.password=password
