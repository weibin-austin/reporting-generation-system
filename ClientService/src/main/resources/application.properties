logging.level.com.antra=DEBUG
logging.file.name=main.service.log
server.port=8080

spring.datasource.driverClassName = org.h2.Driver
spring.datasource.url=jdbc:h2:~/report
spring.datasource.username=sa
# Boot 2.7 no longer auto-enables create-drop for file-based H2, so set it explicitly
spring.jpa.hibernate.ddl-auto=update
# Disable open-session-in-view (Spring recommends against it): keeps the sync
# response from returning a stale first-level-cached entity while the worker
# threads commit their status updates in separate sessions.
spring.jpa.open-in-view=false

#Replace with your own !!!!!
cloud.aws.region.static=us-east-1
cloud.aws.credentials.accessKey=
cloud.aws.credentials.secretKey=
cloud.aws.stack.auto = false

app.aws.sns.topic=reporting_topic
