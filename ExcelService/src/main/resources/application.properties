#sqs.url=https://sqs.us-east-1.amazonaws.com/743634506477/PDF_Request_Queue
s3.bucket=reporting-generated-file

#Replace with your own !!!!!
cloud.aws.region.static=us-east-1
cloud.aws.credentials.accessKey=
cloud.aws.credentials.secretKey=
cloud.aws.stack.auto = false

logging.level.com.antra=DEBUG
logging.file.name=excel.service.log

server.port=8888

# File metadata store (PostgreSQL). Override per environment via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/excel_service}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# springfox 3.0 does not support Spring Boot 2.6+ PathPatternParser default
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
