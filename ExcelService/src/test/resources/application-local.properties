# Test override for the "local" profile: in-memory H2 so tests don't fight
# over the file-based DB lock with a locally running ExcelService instance.
cloud.aws.credentials.accessKey=test
cloud.aws.credentials.secretKey=test
app.aws.endpoint=http://localhost:4566
app.download.base-url=http://localhost:8888
spring.datasource.url=jdbc:h2:mem:excel_testdb;DB_CLOSE_DELAY=-1
